databases:
  - name: fleet-postgres
    databaseName: fleet_telemetry
    user: fleet_user
    plan: free

services:
  # ── Backend API (Node.js nativo — tier gratuito) ──────────────────────────
  - type: web
    name: fleet-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx tsc
    startCommand: node dist/server.js
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: DB_HOST
        fromDatabase:
          name: fleet-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: fleet-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: fleet-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: fleet-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fleet-postgres
          property: password
      # Obtén una URL gratuita en https://upstash.com → Redis → Create Database
      - key: REDIS_URL
        sync: false   # Pegar manualmente desde el dashboard de Upstash

  # ── Frontend SPA (estático — siempre gratuito) ────────────────────────────
  - type: web
    name: fleet-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Pega aquí la URL de fleet-backend una vez desplegado,
      # ej: https://fleet-backend.onrender.com
      - key: VITE_BACKEND_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
